<section class="flex items-center justify-center grow u-responsive-padding-xy">
  <div
    class="overflow-hidden rounded-3xl md:border border-white/50 md:bg-cyan-50 md:shadow-xl md:u-responsive-padding-xy u-container-2">
    <app-user-profile [user]="authState().user" [profileImage]="profileState().profileImage"
      [profileImageLoading]="profileImageLoading()">
      <div profile-actions class="mt-4 flex flex-wrap gap-3">
        <a routerLink="/profile/edit-profile"
          class="u-btn-primary-cyan font-semibold px-4 sm:px-9 py-2.5 inline-flex items-center justify-center leading-5 no-underline max-sm:grow">
          Edit Profile
        </a>
        <button type="button" (click)="onLogout()" class="u-btn-danger-rose px-4 sm:px-9 font-semibold max-sm:grow">
          Logout
        </button>
      </div>
    </app-user-profile>
  </div>
</section>
