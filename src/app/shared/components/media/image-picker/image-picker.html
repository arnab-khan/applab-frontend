<div class="p-4 pt-2">
  <app-dialog-header [title]="'Select Image'"></app-dialog-header>

  <mat-dialog-content>
    <div class="flex justify-center gap-4 pt-4">
      <button type="button"
        class="px-6 py-3 rounded-lg bg-blue-100 hover:bg-blue-200 text-blue-700 font-semibold transition-colors flex items-center gap-2"
        (click)="fileInput.click()">
        <fa-icon [icon]="faFolderOpen"></fa-icon>
        Choose File
      </button>
      <button type="button"
        class="px-6 py-3 rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold transition-colors flex items-center gap-2"
        (click)="cameraInput.click()">
        <fa-icon [icon]="faCamera"></fa-icon>
        Camera
      </button>
    </div>
    <input #fileInput type="file" accept="image/*" (change)="onFileSelected($event)" class="hidden">
    <input #cameraInput type="file" accept="image/*" capture="environment" (change)="onFileSelected($event)"
      class="hidden">
  </mat-dialog-content>
</div>
