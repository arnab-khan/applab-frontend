<app-dialog-header mat-dialog-title [title]="title()" containerClass="u-responsive-padding-x py-2 shadow">
</app-dialog-header>
<mat-dialog-content>
  <div class="u-responsive-padding-x">

    @if (file(); as selectedFile) {
    <div class="mt-4 rounded-xl border border-slate-200 bg-white p-3">
      <image-cropper [imageFile]="selectedFile" [maintainAspectRatio]="maintainAspectRatio()"
        [aspectRatio]="aspectRatio()" [roundCropper]="roundCropper()" [resizeToWidth]="resizeToWidth()"
        [resizeToHeight]="resizeToHeight()" [format]="outputFormat()" [output]="'blob'"
        (imageCropped)="onImageCropped($event)" />
    </div>
    } @else {
    <p class="mt-4 text-sm text-slate-600">No image selected.</p>
    }

    <div class="py-3 flex items-center justify-center">
      <app-loading-button [loading]="isCropping()" class="min-w-[50%]">
        <button type="button" class="u-btn-secondary-gray w-full" (click)="onConfirm()">
          Crop
        </button>
      </app-loading-button>
    </div>
  </div>
</mat-dialog-content>
