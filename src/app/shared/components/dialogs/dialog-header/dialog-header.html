<div class="flex items-start justify-between gap-3" [ngClass]="containerClass()">
  @if (title()) {
  <h2 class="min-w-0 flex-1 text-lg font-semibold text-slate-900">{{ title() }}</h2>
  } @else {
  <div class="min-w-0 flex-1"></div>
  }
  <button type="button" aria-label="Close dialog"
    class="relative h-8 w-8 -me-2 rounded-md text-gray-500 transition-colors hover:bg-gray-100 hover:text-gray-700 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-gray-300"
    (click)="onClose()">
    <fa-icon [icon]="faXmark" class="text-md u-absolute-center-xy"></fa-icon>
  </button>
</div>
