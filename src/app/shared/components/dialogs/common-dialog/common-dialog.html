<div class="p-4 pt-2">
  <app-dialog-header></app-dialog-header>

  <mat-dialog-content>
    @if (message()) {
    <p class="m-0 text-gray-700">{{ message() }}</p>
    }
  </mat-dialog-content>

  <mat-dialog-actions>
    <div class="flex justify-end gap-2 w-full pt-3">
      @if (cancelText()) {
      <button type="button"
        class="px-4 py-2 rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold transition-colors grow sm:grow-0"
        (click)="onCancel()" [disabled]="isConfirming()">{{ cancelText() }}</button>
      }
      @if (confirmText()) {
      <app-loading-button [loading]="isConfirming()" class="grow sm:grow-0">
        <button type="button"
          class="px-4 py-2 rounded-lg font-semibold transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 w-full"
          [class]="confirmButtonClass()" (click)="onConfirm()" [disabled]="isConfirming()">
          {{ confirmText() }}
        </button>
      </app-loading-button>
      }
    </div>
  </mat-dialog-actions>
</div>
